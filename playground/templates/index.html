<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Depot Playground</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2rem auto;
        max-width: 1100px;
        padding: 0 1rem;
      }
      form {
        display: grid;
        gap: 1rem;
      }
      label {
        display: grid;
        gap: 0.5rem;
        font-weight: 600;
      }
      .toolbar {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        align-items: end;
      }
      .scenario-controls {
        display: flex;
        gap: 0.75rem;
        align-items: end;
      }
      .scenario-controls label {
        flex: 1;
      }
      .main-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
        align-items: start;
      }
      .panel {
        border: 1px solid #d9d9d9;
        background: #fafafa;
        padding: 1rem;
        border-radius: 0.5rem;
      }
      .catalog-help {
        color: #666;
        font-size: 0.95rem;
        margin: 0.5rem 0 1rem;
      }
      .catalog-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.5rem;
      }
      .catalog-item {
        margin: 0;
      }
      .catalog-insert {
        width: 100%;
        text-align: left;
        padding: 0.6rem 0.75rem;
        border: 1px solid #d9d9d9;
        border-radius: 0.4rem;
        background: #fff;
        cursor: pointer;
      }
      select,
      textarea,
      button {
        font: inherit;
      }
      select {
        min-width: 0;
      }
      textarea {
        min-height: 20rem;
        padding: 0.75rem;
        width: 100%;
        box-sizing: border-box;
      }
      button {
        width: fit-content;
        padding: 0.75rem 1.25rem;
      }
      pre {
        background: #f4f4f4;
        padding: 1rem;
        overflow-x: auto;
        white-space: pre-wrap;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-top: 1px solid #e3e3e3;
        padding: 0.65rem 0.5rem;
        text-align: left;
        vertical-align: top;
      }
      th {
        border-top: 0;
      }
      .state-grid {
        display: grid;
        gap: 1rem;
      }
      .state-drawer {
        margin-top: 1.5rem;
      }
      .state-drawer summary {
        cursor: pointer;
        font-weight: 600;
      }
      .state-drawer[open] summary {
        margin-bottom: 1rem;
      }
      .state-section h2 {
        margin: 0 0 0.75rem;
        font-size: 1rem;
      }
      .empty-state {
        color: #666;
      }
      @media (max-width: 800px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Book Depot Playground</h1>
    <form method="post" action="/run">
      <div class="toolbar">
        <label>
          Partner
          <select id="partner" name="partner">
            {{partner_options}}
          </select>
        </label>
        <div class="scenario-controls">
          <label>
            Scenario
            <select name="scenario">
              <option value="">Select a scenario</option>
              {{scenario_options}}
            </select>
          </label>
          <button type="submit" name="action" value="load">Load</button>
        </div>
      </div>
      <div class="main-grid">
        <aside class="panel">
          <strong>Catalog</strong>
          <p class="catalog-help">Click a slug to insert <code>slug*1</code> into the script.</p>
          <ul class="catalog-list">
            {{catalog_html}}
          </ul>
        </aside>
        <section>
          <label>
            DSL script
            <textarea id="script" name="script">{{script}}</textarea>
          </label>
          <button type="submit" name="action" value="run">Run</button>
        </section>
      </div>
    </form>
    {{results_html}}
    <details class="panel state-section state-drawer" open>
      <summary>Current State</summary>
      <div class="state-grid">
        <section>
          <h2>Delivery Requests</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Status</th>
                <th>Items</th>
              </tr>
            </thead>
            <tbody id="delivery-requests-body">
              {{dr_rows}}
            </tbody>
          </table>
        </section>
        <section>
          <h2>Sales Reports</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Voided</th>
                <th>Items</th>
              </tr>
            </thead>
            <tbody id="sales-reports-body">
              {{sr_rows}}
            </tbody>
          </table>
        </section>
        <section>
          <h2>Stock</h2>
          <table>
            <thead>
              <tr>
                <th>Book</th>
                <th>Quantity</th>
              </tr>
            </thead>
            <tbody id="stock-body">
              {{stock_rows}}
            </tbody>
          </table>
        </section>
      </div>
    </details>
    <script id="catalog-data" type="application/json">{{catalog_data_json}}</script>
    <script id="current-state-data" type="application/json">{{current_state_json}}</script>
    <script>
      const catalogDataNode = document.getElementById("catalog-data");
      const currentStateDataNode = document.getElementById("current-state-data");
      const partnerField = document.getElementById("partner");
      const scriptField = document.getElementById("script");
      const catalogEntries = catalogDataNode ? JSON.parse(catalogDataNode.textContent) : [];
      let currentState = currentStateDataNode ? JSON.parse(currentStateDataNode.textContent) : {
        delivery_requests: [],
        sales_reports: [],
        stock: [],
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderDeliveryRequests(rows) {
        const body = document.getElementById("delivery-requests-body");
        if (!body) {
          return;
        }
        if (!rows.length) {
          body.innerHTML = '<tr><td colspan="3" class="empty-state">No delivery requests</td></tr>';
          return;
        }
        body.innerHTML = rows.map((entry) => (
          `<tr><td>${escapeHtml(entry.id)}</td><td>${escapeHtml(entry.status)}</td><td><code>${escapeHtml(entry.items)}</code></td></tr>`
        )).join("");
      }

      function renderSalesReports(rows) {
        const body = document.getElementById("sales-reports-body");
        if (!body) {
          return;
        }
        if (!rows.length) {
          body.innerHTML = '<tr><td colspan="3" class="empty-state">No sales reports</td></tr>';
          return;
        }
        body.innerHTML = rows.map((entry) => (
          `<tr><td>${escapeHtml(entry.id)}</td><td>${entry.voided ? "yes" : "no"}</td><td><code>${escapeHtml(entry.items)}</code></td></tr>`
        )).join("");
      }

      function renderStock(rows) {
        const body = document.getElementById("stock-body");
        if (!body) {
          return;
        }
        if (!rows.length) {
          body.innerHTML = '<tr><td colspan="2" class="empty-state">No stock</td></tr>';
          return;
        }
        body.innerHTML = rows.map((entry) => (
          `<tr><td><code>${escapeHtml(entry.book_id)}</code></td><td>${escapeHtml(entry.quantity)}</td></tr>`
        )).join("");
      }

      function renderCurrentState(state) {
        renderDeliveryRequests(state.delivery_requests || []);
        renderSalesReports(state.sales_reports || []);
        renderStock(state.stock || []);
      }

      function insertCatalogSlug(slug) {
        if (!scriptField) {
          return;
        }

        const token = `${slug}*1`;
        const currentValue = scriptField.value;
        scriptField.value = currentValue ? `${currentValue}\n${token}` : token;
        scriptField.focus();
      }

      document.querySelectorAll(".catalog-insert").forEach((button) => {
        button.addEventListener("click", () => {
          insertCatalogSlug(button.dataset.slug || "");
        });
      });

      async function refreshCurrentState(partnerId) {
        const response = await fetch(`/current-state?partner_id=${encodeURIComponent(partnerId)}`);
        if (!response.ok) {
          return;
        }
        currentState = await response.json();
        renderCurrentState(currentState);
      }

      if (partnerField) {
        partnerField.addEventListener("change", () => {
          refreshCurrentState(partnerField.value);
        });
      }

      renderCurrentState(currentState);
    </script>
  </body>
</html>
