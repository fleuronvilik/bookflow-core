<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Depot Playground</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2rem auto;
        max-width: 1100px;
        padding: 0 1rem;
      }
      form {
        display: grid;
        gap: 1rem;
      }
      label {
        display: grid;
        gap: 0.5rem;
        font-weight: 600;
      }
      .toolbar {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        align-items: end;
      }
      .scenario-controls {
        display: flex;
        gap: 0.75rem;
        align-items: end;
      }
      .scenario-controls label {
        flex: 1;
      }
      .main-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
        align-items: start;
      }
      .panel {
        border: 1px solid #d9d9d9;
        background: #fafafa;
        padding: 1rem;
        border-radius: 0.5rem;
      }
      .catalog-help {
        color: #666;
        font-size: 0.95rem;
        margin: 0.5rem 0 1rem;
      }
      .catalog-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.5rem;
      }
      .catalog-item {
        margin: 0;
      }
      .catalog-insert {
        width: 100%;
        text-align: left;
        padding: 0.6rem 0.75rem;
        border: 1px solid #d9d9d9;
        border-radius: 0.4rem;
        background: #fff;
        cursor: pointer;
      }
      select,
      textarea,
      button {
        font: inherit;
      }
      select {
        min-width: 0;
      }
      textarea {
        min-height: 20rem;
        padding: 0.75rem;
        width: 100%;
        box-sizing: border-box;
      }
      button {
        width: fit-content;
        padding: 0.75rem 1.25rem;
      }
      pre {
        background: #f4f4f4;
        padding: 1rem;
        overflow-x: auto;
        white-space: pre-wrap;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-top: 1px solid #e3e3e3;
        padding: 0.65rem 0.5rem;
        text-align: left;
        vertical-align: top;
      }
      th {
        border-top: 0;
      }
      .state-grid {
        display: grid;
        gap: 1rem;
      }
      .state-section h2 {
        margin: 0 0 0.75rem;
        font-size: 1rem;
      }
      .empty-state {
        color: #666;
      }
      @media (max-width: 800px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Book Depot Playground</h1>
    <form method="post" action="/run">
      <div class="toolbar">
        <label>
          Partner
          <select name="partner">
            {{partner_options}}
          </select>
        </label>
        <div class="scenario-controls">
          <label>
            Scenario
            <select name="scenario">
              <option value="">Select a scenario</option>
              {{scenario_options}}
            </select>
          </label>
          <button type="submit" name="action" value="load">Load</button>
        </div>
      </div>
      <div class="main-grid">
        <aside class="panel">
          <strong>Catalog</strong>
          <p class="catalog-help">Click a slug to insert <code>slug*1</code> into the script.</p>
          <ul class="catalog-list">
            {{catalog_html}}
          </ul>
        </aside>
        <section>
          <label>
            DSL script
            <textarea id="script" name="script">{{script}}</textarea>
          </label>
          <button type="submit" name="action" value="run">Run</button>
        </section>
      </div>
    </form>
    {{results_html}}
    <section class="panel state-section">
      <strong>Current State</strong>
      <div class="state-grid">
        <section>
          <h2>Delivery Requests</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Status</th>
                <th>Items</th>
              </tr>
            </thead>
            <tbody>
              {{dr_rows}}
            </tbody>
          </table>
        </section>
        <section>
          <h2>Sales Reports</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Voided</th>
                <th>Items</th>
              </tr>
            </thead>
            <tbody>
              {{sr_rows}}
            </tbody>
          </table>
        </section>
        <section>
          <h2>Stock</h2>
          <table>
            <thead>
              <tr>
                <th>Book</th>
                <th>Quantity</th>
              </tr>
            </thead>
            <tbody>
              {{stock_rows}}
            </tbody>
          </table>
        </section>
      </div>
    </section>
    <script id="catalog-data" type="application/json">{{catalog_data_json}}</script>
    <script>
      const catalogDataNode = document.getElementById("catalog-data");
      const scriptField = document.getElementById("script");
      const catalogEntries = catalogDataNode ? JSON.parse(catalogDataNode.textContent) : [];

      function insertCatalogSlug(slug) {
        if (!scriptField) {
          return;
        }

        const token = `${slug}*1`;
        const currentValue = scriptField.value;
        scriptField.value = currentValue ? `${currentValue}\n${token}` : token;
        scriptField.focus();
      }

      document.querySelectorAll(".catalog-insert").forEach((button) => {
        button.addEventListener("click", () => {
          insertCatalogSlug(button.dataset.slug || "");
        });
      });
    </script>
  </body>
</html>
